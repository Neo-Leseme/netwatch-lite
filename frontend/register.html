<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - NetWatch Lite</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0a0a0f;
    --card: rgba(255,255,255,0.05);
    --glass: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);

    --accent: #00f0ff;
    --accent2: #7c3aed;

    --text: #e5e7eb;
    --muted: #94a3b8;

    --danger: #ef4444;
    --success: #22c55e;
}

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--text);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;

    background: linear-gradient(-45deg, #0a0a0f, #0f172a, #020617, #0a0a0f);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;
}

@keyframes gradient {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

h2 {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    margin-bottom: 1.5rem;
}

/* CARD */
.login-card {
    background: var(--card);
    backdrop-filter: blur(12px);
    padding: 2rem;
    border-radius: 16px;
    width: 320px;
    border: 1px solid var(--border);

    box-shadow: 0 0 30px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.login-card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 40px rgba(0,240,255,0.15);
}

/* FORM */
.form-group {
    margin-bottom: 1rem;
}

label {
    display: block;
    margin-bottom: 0.4rem;
    color: var(--muted);
    font-size: 0.85rem;
}

input {
    width: 100%;
    padding: 0.6rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #020617;
    color: var(--text);
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0,240,255,0.3);
}

/* BUTTON */
button {
    width: 100%;
    padding: 0.75rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: black;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 1rem;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px var(--accent);
}

/* ERROR */
.error {
    color: var(--danger);
    font-size: 0.8rem;
    text-align: center;
    margin-top: 1rem;
}

/* SUCCESS (optional if you add later) */
.success {
    color: var(--success);
    font-size: 0.8rem;
    text-align: center;
    margin-top: 1rem;
}

/* LINK */
.link {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.9rem;
}

.link a {
    color: var(--accent);
    text-decoration: none;
}

.link a:hover {
    text-shadow: 0 0 10px var(--accent);
}

/* FOOTER */
.footer {
    margin-top: 2rem;
    padding: 1rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
}

.footer span {
    color: var(--accent);
}
</style>
</head>

<body>

<div class="login-card">
    <h2>Create Account</h2>

    <form id="registerForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Register</button>
        <div id="errorMsg" class="error"></div>
    </form>

    <div class="link">
        Have an account? <a href="login.html">Login here</a>
    </div>
</div>

<div class="footer">
    © <span id="year"></span> <span>Neo Leseme</span>. All rights reserved.
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

document.getElementById('registerForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const formData = new FormData();
    formData.append('action', 'register');
    formData.append('username', document.getElementById('username').value);
    formData.append('email', document.getElementById('email').value);
    formData.append('password', document.getElementById('password').value);

    try {
        const response = await fetch('../backend/auth.php', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (result.success) {
            alert('Registration successful! Please login.');
            window.location.href = 'login.html';
        } else {
            document.getElementById('errorMsg').innerText = result.message;
        }
    } catch {
        document.getElementById('errorMsg').innerText = 'Connection error';
    }
});
</script>

</body>
</html>
